# tinyloom configuration
# All fields are optional - defaults work out of the box.

model:
  provider: anthropic
  model: claude-sonnet-4-20250514
  # base_url: https://my-proxy.com/v1
  max_tokens: 8192
  context_window: 200000
  temperature: 0.0
  # sync_http: true  # use sync HTTP for TLS -- required in microsandbox VMs

system_prompt: |
  You are a skilled coding assistant. You have access to tools for
  reading, writing, and editing files, searching code, and running
  shell commands. Be concise. When editing files, always read them
  first to see the exact content.

compaction:
  enabled: true
  threshold: 0.8
  strategy: summarize
  # model: claude-haiku-4-5-20251001  # cheaper model for summaries
  # provider: anthropic

# plugins:
#   - tinyloom.plugins.subagent
#   - tinyloom.plugins.todo
#   - tinyloom.plugins.mcp
#   - tinyloom.plugins.hook_scripts

# hook_scripts:
#   tool_call:
#     - command: "./hooks/approve-tool.sh"
#     - command: "python hooks/filter.py"
#   message:user:
#     - command: "./hooks/input-filter.sh"
# Exit codes: 0=pass, 1=error(logged), 2=deny(sets skip+reason from stdout)

max_turns: 200
